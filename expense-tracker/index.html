<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>personal expense tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      line-height: 1.5;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      max-width: 672px;
      margin: 0 auto;
    }

    /* Header */
    .header h1 {
      font-size: 1.875rem;
      font-weight: 600;
      color: #111456;
    }

    .header p {
      color: #6b7280;
      margin-top: 4px;
      font-size: 0.875rem;
    }

    .header {
      margin-bottom: 32px;
    }

    /* Summary Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 16px;
    }

    .summary-card .label {
      font-size: 0.75rem;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .summary-card .value {
      font-size: 1.5rem;
      font-weight: 600;
      color: #111827;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .card-padded {
      padding: 24px;
    }

    /* Form */
    .form-title {
      font-size: 1rem;
      font-weight: 500;
      color: #1f2937;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      color: #4b5563;
      margin-bottom: 4px;
    }

    .form-input,
    .form-select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-input::placeholder {
      color: #9ca3af;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }

    .form-error {
      color: #ef4444;
      font-size: 0.75rem;
      margin-bottom: 12px;
      display: none;
    }

    .btn-submit {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #9333ea;
      color: #fff;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    .btn-submit:hover {
      background: #7e22ce;
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    /* List header */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #f3f4f6;
    }

    .list-header h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #1f2937;
    }

    .list-meta {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    /* Expense item */
    .expense-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f9fafb;
      transition: background 0.15s;
    }

    .expense-item:last-child {
      border-bottom: none;
    }

    .expense-item:hover {
      background: #f9fafb;
    }

    /* Badge */
    .badge {
      font-size: 0.6875rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 9999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-Food {
      background: #d1fae5;
      color: #065f46;
    }

    .badge-Travel {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge-Utilities {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-Entertainment {
      background: #ede9fe;
      color: #5b21b6;
    }

    .badge-Health {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-Other {
      background: #f3f4f6;
      color: #374151;
    }

    .expense-name {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 500;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .expense-date {
      font-size: 0.75rem;
      color: #9ca3af;
      flex-shrink: 0;
    }

    .expense-amount {
      font-size: 0.875rem;
      font-weight: 600;
      color: #111827;
      min-width: 70px;
      text-align: right;
      flex-shrink: 0;
    }

    .btn-delete, .btn-edit {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.125rem;
      line-height: 1;
      color: #9ca3af;
      transition: color 0.15s;
      flex-shrink: 0;
      padding: 4px;
    }

    .btn-delete:hover {
      color: red;
    }

    .btn-edit:hover {
      color: #3b82f6;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
      color: #9ca3af;
    }

    .empty-state .emoji {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 0.875rem;
    }

    /* View Expenses Button */
    .btn-view-expenses {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 18px 24px;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      background: linear-gradient(135deg, #f5f3ff, #ede9fe);
      color: #7c3aed;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-view-expenses::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(147, 51, 234, 0.08), transparent);
      transition: left 0.5s ease;
    }

    .btn-view-expenses:hover::before {
      left: 100%;
    }

    .btn-view-expenses:hover {
      border-color: #a78bfa;
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(147, 51, 234, 0.15);
    }

    .btn-view-expenses:active {
      transform: translateY(0);
    }

    .btn-arrow {
      font-size: 1.25rem;
      transition: transform 0.25s ease;
    }

    .btn-view-expenses:hover .btn-arrow {
      transform: translateX(4px);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1f2937;
      color: #fff;
      padding: 14px 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-icon {
      font-size: 1.125rem;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Expense Tracker</h1>
      <p>Log and track your daily spending</p>
    </div>

    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">Total spent</div>
        <div class="value" id="stat-total">Rs0</div>
      </div>
      <div class="summary-card">
        <div class="label">Expenses</div>
        <div class="value" id="stat-count">0</div>
      </div>
      <div class="summary-card">
        <div class="label">Average</div>
        <div class="value" id="stat-avg">Rs0</div>
      </div>
    </div>

    <!-- Add Expense Form -->
    <div class="card">
      <div class="card-padded">
        <h2 class="form-title">Add expense</h2>
        <form id="expense-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="exp-name">Expense name</label>
            <input id="exp-name" type="text" class="form-input" placeholder="e.g. Lunch at café" />
          </div>
          <div class="form-row form-group">
            <div>
              <label class="form-label" for="exp-amount">Amount (Rs.)</label>
              <input id="exp-amount" type="number" class="form-input" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div>
              <label class="form-label" for="exp-date">Date</label>
              <input id="exp-date" type="date" class="form-input" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="exp-category">Category</label>
            <select id="exp-category" class="form-select">
              <option value="">Select a category</option>
              <option value="Food">Food</option>
              <option value="Travel">Travel</option>
              <option value="Utilities">Utilities</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Health">Health</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <p class="form-error" id="form-error"></p>
          <button type="submit" class="btn-submit">+ Add expense</button>
        </form>
      </div>
    </div>

    <!-- View Expenses Button -->
    <a href="expenses.html" class="btn-view-expenses" id="btn-view-expenses">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
        <path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811V2.828zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492V2.687zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783z"/>
      </svg>
      <span>View Expenses</span>
      <span class="btn-arrow">→</span>
    </a>

    <!-- Success Toast -->
    <div class="toast" id="toast-success">
      <span class="toast-icon">✅</span>
      <span class="toast-msg">Expense added successfully!</span>
    </div>

  </div>

  <script>
   // ── State ──────────────────────────────────────────────
var expenses = [];
var editingId = null;

// ── Helpers ────────────────────────────────────────────
function formatAmount(amount) {
  return "Rs" + Number(amount).toLocaleString("en-IN");
}

// ── DOM references ────────────────────────────────────
var form = document.getElementById("expense-form");
var nameInput = document.getElementById("exp-name");
var amountInput = document.getElementById("exp-amount");
var dateInput = document.getElementById("exp-date");
var catInput = document.getElementById("exp-category");
var errorEl = document.getElementById("form-error");
var statTotal = document.getElementById("stat-total");
var statCount = document.getElementById("stat-count");
var statAvg = document.getElementById("stat-avg");
var toastEl = document.getElementById("toast-success");

// Set default date to today
dateInput.value = new Date().toISOString().split("T")[0];

// ── Render summary ───────────────────────────────────
function renderSummary() {
  var total = 0;
  for (var i = 0; i < expenses.length; i++) total += expenses[i].amount;
  var avg = expenses.length ? Math.round(total / expenses.length) : 0;

  statTotal.textContent = formatAmount(total);
  statCount.textContent = expenses.length;
  statAvg.textContent = formatAmount(avg);
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  toastEl.querySelector(".toast-msg").textContent = msg;
  toastEl.classList.add("show");
  setTimeout(function() { toastEl.classList.remove("show"); }, 2500);
}

// ── FETCH all expenses from backend ──────────────────
function loadExpenses() {
  fetch("http://localhost:3000/expenses")
    .then(function(res) { return res.json(); })
    .then(function(data) {
      expenses = data;
      renderSummary();
    })
    .catch(function(err) {
      console.error("Failed to load expenses:", err);
    });
}

// ── ADD expense — POST to backend ────────────────────
form.addEventListener("submit", function(e) {
  e.preventDefault();

  var name = nameInput.value.trim();
  var amount = amountInput.value;
  var date = dateInput.value;
  var category = catInput.value;

  if (!name || !amount || !date || !category) {
    errorEl.textContent = "Please fill in all fields before adding.";
    errorEl.style.display = "block";
    return;
  }
  if (Number(amount) <= 0) {
    errorEl.textContent = "Amount must be greater than zero.";
    errorEl.style.display = "block";
    return;
  }

  fetch("http://localhost:3000/expenses", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: name, amount: parseFloat(amount), date: date, category: category }),
  })
    .then(function(res) { return res.json(); })
    .then(function(newExpense) {
      expenses.unshift(newExpense);
      nameInput.value = "";
      amountInput.value = "";
      catInput.value = "";
      errorEl.style.display = "none";
      renderSummary();
      showToast("Expense added successfully!");
    })
    .catch(function(err) { console.error("Failed to add expense:", err); });
});

// ── Load expenses on page start ───────────────────────
loadExpenses();
  </script>
</body>

</html>
