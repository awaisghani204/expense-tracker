<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>personal expense tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      line-height: 1.5;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      max-width: 672px;
      margin: 0 auto;
    }

    /* Header */
    .header h1 {
      font-size: 1.875rem;
      font-weight: 600;
      color: #111456;
    }

    .header p {
      color: #6b7280;
      margin-top: 4px;
      font-size: 0.875rem;
    }

    .header {
      margin-bottom: 32px;
    }

    /* Summary Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 16px;
    }

    .summary-card .label {
      font-size: 0.75rem;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .summary-card .value {
      font-size: 1.5rem;
      font-weight: 600;
      color: #111827;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      margin-bottom: 32px;
      overflow: hidden;
    }

    .card-padded {
      padding: 24px;
    }

    /* Form */
    .form-title {
      font-size: 1rem;
      font-weight: 500;
      color: #1f2937;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      color: #4b5563;
      margin-bottom: 4px;
    }

    .form-input,
    .form-select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-input::placeholder {
      color: #9ca3af;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }

    .form-error {
      color: #ef4444;
      font-size: 0.75rem;
      margin-bottom: 12px;
      display: none;
    }

    .btn-submit {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #9333ea;
      color: #fff;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    .btn-submit:hover {
      background: #7e22ce;
    }

    .btn-submit:active {
      transform: scale(0.97);
    }

    /* List header */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #f3f4f6;
    }

    .list-header h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #1f2937;
    }

    .list-meta {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    /* Expense item */
    .expense-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f9fafb;
      transition: background 0.15s;
    }

    .expense-item:last-child {
      border-bottom: none;
    }

    .expense-item:hover {
      background: #f9fafb;
    }

    /* Badge */
    .badge {
      font-size: 0.6875rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 9999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-Food {
      background: #d1fae5;
      color: #065f46;
    }

    .badge-Travel {
      background: #dbeafe;
      color: #1e40af;
    }

    .badge-Utilities {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-Entertainment {
      background: #ede9fe;
      color: #5b21b6;
    }

    .badge-Health {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-Other {
      background: #f3f4f6;
      color: #374151;
    }

    .expense-name {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 500;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .expense-date {
      font-size: 0.75rem;
      color: #9ca3af;
      flex-shrink: 0;
    }

    .expense-amount {
      font-size: 0.875rem;
      font-weight: 600;
      color: #111827;
      min-width: 70px;
      text-align: right;
      flex-shrink: 0;
    }

    .btn-delete, .btn-edit {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.125rem;
      line-height: 1;
      color: #9ca3af;
      transition: color 0.15s;
      flex-shrink: 0;
      padding: 4px;
    }

    .btn-delete:hover {
      color: red;
    }

    .btn-edit:hover {
      color: #3b82f6;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
      color: #9ca3af;
    }

    .empty-state .emoji {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 0.875rem;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Expense Tracker</h1>
      <p>Log and track your daily spending</p>
    </div>

    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">Total spent</div>
        <div class="value" id="stat-total">Rs0</div>
      </div>
      <div class="summary-card">
        <div class="label">Expenses</div>
        <div class="value" id="stat-count">0</div>
      </div>
      <div class="summary-card">
        <div class="label">Average</div>
        <div class="value" id="stat-avg">Rs0</div>
      </div>
    </div>

    <!-- Add Expense Form -->
    <div class="card">
      <div class="card-padded">
        <h2 class="form-title">Add expense</h2>
        <form id="expense-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="exp-name">Expense name</label>
            <input id="exp-name" type="text" class="form-input" placeholder="e.g. Lunch at café" />
          </div>
          <div class="form-row form-group">
            <div>
              <label class="form-label" for="exp-amount">Amount (Rs.)</label>
              <input id="exp-amount" type="number" class="form-input" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div>
              <label class="form-label" for="exp-date">Date</label>
              <input id="exp-date" type="date" class="form-input" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="exp-category">Category</label>
            <select id="exp-category" class="form-select">
              <option value="">Select a category</option>
              <option value="Food">Food</option>
              <option value="Travel">Travel</option>
              <option value="Utilities">Utilities</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Health">Health</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <p class="form-error" id="form-error"></p>
          <button type="submit" class="btn-submit">+ Add expense</button>
        </form>
      </div>
    </div>

    <!-- Expense List -->
    <div class="card" style="margin-bottom: 0;">
      <div class="list-header">
        <h2>Expenses</h2>
        <span class="list-meta" id="list-meta"></span>
      </div>
      <div id="expense-list"></div>
    </div>

  </div>

  <script>
   // ── State ──────────────────────────────────────────────
var expenses = [];
var editingId = null;

// ── Helpers ────────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return "";
  var parts = dateStr.split("-");
  return parts[2] + "/" + parts[1] + "/" + parts[0];
}

function formatAmount(amount) {
  return "Rs" + Number(amount).toLocaleString("en-IN");
}

// ── DOM references ────────────────────────────────────
var form = document.getElementById("expense-form");
var nameInput = document.getElementById("exp-name");
var amountInput = document.getElementById("exp-amount");
var dateInput = document.getElementById("exp-date");
var catInput = document.getElementById("exp-category");
var errorEl = document.getElementById("form-error");
var listEl = document.getElementById("expense-list");
var metaEl = document.getElementById("list-meta");
var statTotal = document.getElementById("stat-total");
var statCount = document.getElementById("stat-count");
var statAvg = document.getElementById("stat-avg");

// Set default date to today
dateInput.value = new Date().toISOString().split("T")[0];

// ── Render ────────────────────────────────────────────
function render() {
  var total = 0;
  for (var i = 0; i < expenses.length; i++) total += expenses[i].amount;
  var avg = expenses.length ? Math.round(total / expenses.length) : 0;

  statTotal.textContent = formatAmount(total);
  statCount.textContent = expenses.length;
  statAvg.textContent = formatAmount(avg);

  if (expenses.length > 0) {
    metaEl.textContent = expenses.length + " item" + (expenses.length !== 1 ? "s" : "");
  } else {
    metaEl.textContent = "";
  }

  if (expenses.length === 0) {
    listEl.innerHTML =
      '<div class="empty-state">' +
      '<div class="emoji">🧾</div>' +
      '<p>No expenses yet. Add one above!</p>' +
      '</div>';
    return;
  }

  var html = "";
  for (var i = 0; i < expenses.length; i++) {
    var exp = expenses[i];
    var badgeClass = "badge badge-" + (exp.category || "Other");
    html +=
      '<div class="expense-item">' +
      '<span class="' + badgeClass + '">' + exp.category + '</span>' +
      '<span class="expense-name">' + exp.name + '</span>' +
      '<span class="expense-date">' + formatDate(exp.date) + '</span>' +
      '<span class="expense-amount">' + formatAmount(exp.amount) + '</span>' +
      '<button class="btn-edit" data-id="' + exp.id + '" title="Edit">' +
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>' +
      '</button>' +
      '<button class="btn-delete" data-id="' + exp.id + '" title="Delete">' +
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/></svg>' +
      '</button>' +
      '</div>';
  }
  listEl.innerHTML = html;
}

// ── FETCH all expenses from backend ──────────────────
function loadExpenses() {
  fetch("http://localhost:3000/expenses")
    .then(function(res) { return res.json(); })
    .then(function(data) {
      expenses = data;
      render();
    })
    .catch(function(err) {
      console.error("Failed to load expenses:", err);
    });
}

// ── ADD/EDIT expense — POST/PUT to backend ────────────
form.addEventListener("submit", function(e) {
  e.preventDefault();

  var name = nameInput.value.trim();
  var amount = amountInput.value;
  var date = dateInput.value;
  var category = catInput.value;

  if (!name || !amount || !date || !category) {
    errorEl.textContent = "Please fill in all fields before adding.";
    errorEl.style.display = "block";
    return;
  }
  if (Number(amount) <= 0) {
    errorEl.textContent = "Amount must be greater than zero.";
    errorEl.style.display = "block";
    return;
  }

  var submitBtn = form.querySelector(".btn-submit");

  if (editingId) {
    // PUT (Update)
    fetch("http://localhost:3000/expenses/" + editingId, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, amount: parseFloat(amount), date: date, category: category }),
    })
      .then(function(res) { return res.json(); })
      .then(function(updatedExpense) {
        // Find and replace in local array
        for (var i = 0; i < expenses.length; i++) {
          if (String(expenses[i].id) === String(editingId)) {
            expenses[i] = updatedExpense;
            break;
          }
        }
        editingId = null;
        submitBtn.textContent = "+ Add expense";
        resetForm();
      })
      .catch(function(err) { console.error("Failed to update expense:", err); });
  } else {
    // POST (Create)
    fetch("http://localhost:3000/expenses", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, amount: parseFloat(amount), date: date, category: category }),
    })
      .then(function(res) { return res.json(); })
      .then(function(newExpense) {
        expenses.unshift(newExpense);
        resetForm();
      })
      .catch(function(err) { console.error("Failed to add expense:", err); });
  }

  function resetForm() {
    nameInput.value = "";
    amountInput.value = "";
    catInput.value = "";
    errorEl.style.display = "none";
    render();
  }
});

// ── EDIT / DELETE expense ─────────────────────────────
listEl.addEventListener("click", function(e) {
  var editBtn = e.target.closest(".btn-edit");
  var deleteBtn = e.target.closest(".btn-delete");

  if (editBtn) {
    var id = editBtn.getAttribute("data-id");
    var expenseToEdit = null;
    for (var i = 0; i < expenses.length; i++) {
      if (String(expenses[i].id) === String(id)) {
        expenseToEdit = expenses[i];
        break;
      }
    }
    if (expenseToEdit) {
      nameInput.value = expenseToEdit.name;
      amountInput.value = expenseToEdit.amount;
      dateInput.value = expenseToEdit.date;
      catInput.value = expenseToEdit.category;
      editingId = id;
      form.querySelector(".btn-submit").textContent = "Update expense";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  } else if (deleteBtn) {
    var id = deleteBtn.getAttribute("data-id");

    fetch("http://localhost:3000/expenses/" + id, {
      method: "DELETE",
    })
      .then(function() {
        expenses = expenses.filter(function(exp) {
          return String(exp.id) !== String(id);
        });
        render();
      })
      .catch(function(err) {
        console.error("Failed to delete expense:", err);
      });
  }
});

// ── Load expenses on page start ───────────────────────
loadExpenses();
  </script>
</body>

</html>
