<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Expenses — Expense Tracker</title>
  <meta name="description" content="View and filter all your tracked expenses by category." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      line-height: 1.5;
      min-height: 100vh;
      padding: 40px 16px;
    }

    .container {
      max-width: 1024px;
      margin: 0 auto;
    }

    /* ── Layout Grid ────────────────────────────────── */
    .layout-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 32px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 24px;
    }

    /* ── Header ─────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .btn-add-expense {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(124, 58, 237, 0.25);
    }

    .btn-add-expense:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
    }

    .btn-add-expense:active {
      transform: translateY(0);
    }

    .page-header-text h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #111456;
    }

    .page-header-text p {
      font-size: 0.8125rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-greeting {
      font-size: 0.8125rem;
      color: #6b7280;
    }

    .user-greeting strong {
      color: #111827;
    }

    .btn-logout {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #6b7280;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-logout:hover {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #ef4444;
    }

    /* ── Filter Bar ─────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
    }

    /* ── Search Input ───────────────────────────────── */
    .search-wrapper {
      position: relative;
      width: 100%;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
      transition: color 0.2s;
    }

    .search-wrapper:focus-within .search-icon {
      color: #7c3aed;
    }

    .search-input {
      width: 100%;
      padding: 10px 40px 10px 42px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.875rem;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search-input::placeholder {
      color: #9ca3af;
    }

    .search-input:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
      background: #fff;
    }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: #e5e7eb;
      color: #6b7280;
      font-size: 0.75rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .search-clear:hover {
      background: #d1d5db;
      color: #111827;
    }

    .search-clear.visible {
      display: flex;
    }

    .filter-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-pill {
      padding: 7px 16px;
      border-radius: 9999px;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      color: #6b7280;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .filter-pill:hover {
      border-color: #c4b5fd;
      color: #7c3aed;
      background: #f5f3ff;
    }

    .filter-pill.active {
      background: #7c3aed;
      color: #fff;
      border-color: #7c3aed;
      box-shadow: 0 2px 8px rgba(124, 58, 237, 0.25);
    }

    /* ── Stats Row ──────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.8125rem;
      color: #6b7280;
    }

    .stat-chip strong {
      color: #111827;
      font-weight: 600;
    }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #f3f4f6;
    }

    .list-header h2 {
      font-size: 0.9375rem;
      font-weight: 500;
      color: #1f2937;
    }

    .list-meta {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    /* ── Expense Item ──────────────────────────────── */
    .expense-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f9fafb;
      transition: background 0.15s;
      animation: fadeSlideIn 0.3s ease both;
    }

    .expense-item:last-child {
      border-bottom: none;
    }

    .expense-item:hover {
      background: #faf9ff;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Badge ──────────────────────────────────────── */
    .badge {
      font-size: 0.6875rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 9999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-Food { background: #d1fae5; color: #065f46; }
    .badge-Travel { background: #dbeafe; color: #1e40af; }
    .badge-Utilities { background: #fef3c7; color: #92400e; }
    .badge-Entertainment { background: #ede9fe; color: #5b21b6; }
    .badge-Health { background: #fee2e2; color: #991b1b; }
    .badge-Other { background: #f3f4f6; color: #374151; }

    .expense-name {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 500;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .expense-date {
      font-size: 0.75rem;
      color: #9ca3af;
      flex-shrink: 0;
    }

    .expense-amount {
      font-size: 0.875rem;
      font-weight: 600;
      color: #111827;
      min-width: 70px;
      text-align: right;
      flex-shrink: 0;
    }

    .btn-delete, .btn-edit {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1.125rem;
      line-height: 1;
      color: #9ca3af;
      transition: color 0.15s, transform 0.15s;
      flex-shrink: 0;
      padding: 4px;
    }

    .btn-delete:hover { color: #ef4444; transform: scale(1.15); }
    .btn-edit:hover { color: #3b82f6; transform: scale(1.15); }

    /* ── Empty State ────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: #9ca3af;
    }

    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 0.9375rem;
    }

    .empty-state .subtext {
      font-size: 0.8125rem;
      margin-top: 6px;
      color: #c4b5fd;
    }

    /* ── Edit Modal ─────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      transform: scale(0.95) translateY(12px);
      transition: transform 0.25s ease;
    }

    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal h3 {
      font-size: 1.125rem;
      font-weight: 600;
      color: #111827;
      margin-bottom: 20px;
    }

    .modal .form-group {
      margin-bottom: 14px;
    }

    .modal .form-label {
      display: block;
      font-size: 0.8125rem;
      color: #4b5563;
      margin-bottom: 4px;
    }

    .modal .form-input,
    .modal .form-select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .modal .form-input:focus,
    .modal .form-select:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }

    .modal .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-modal {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    .btn-modal:active { transform: scale(0.97); }

    .btn-modal-cancel {
      background: #f3f4f6;
      color: #4b5563;
    }

    .btn-modal-cancel:hover { background: #e5e7eb; }

    .btn-modal-save {
      background: #7c3aed;
      color: #fff;
    }

    .btn-modal-save:hover { background: #6d28d9; }

    /* ── Toast ──────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1f2937;
      color: #fff;
      padding: 14px 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Search highlight ───────────────────────────── */
    .highlight {
      background: #fef08a;
      color: #111827;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 860px) {
      .layout-grid {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
      }
      .dashboard {
        margin-top: 24px;
      }
    }

    @media (max-width: 480px) {
      .filter-bar { gap: 8px; padding: 12px 14px; }
      .filter-pill { padding: 6px 12px; font-size: 0.75rem; }
      .expense-item { padding: 12px 16px; gap: 8px; }
      .stats-row { flex-wrap: wrap; }
      .modal .form-row { grid-template-columns: 1fr; }
    }

    /* ── Dashboard Section ──────────────────────────── */
    .dashboard {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .dashboard-header h2 {
      font-size: 1.125rem;
      font-weight: 600;
      color: #111827;
    }

    .month-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-selector label {
      font-size: 0.8125rem;
      color: #6b7280;
      font-weight: 500;
    }

    .month-select {
      padding: 7px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.8125rem;
      color: #111827;
      background: #fff;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .month-select:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: center;
    }

    .chart-container {
      position: relative;
      width: 100%;
      max-width: 200px;
      margin: 0 auto;
    }

    .chart-center-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    .chart-center-label .amount {
      font-size: 1.125rem;
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
    }

    .chart-center-label .label {
      font-size: 0.6875rem;
      color: #9ca3af;
      margin-top: 2px;
    }

    .category-breakdown {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cat-info {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cat-name {
      font-size: 0.8125rem;
      color: #4b5563;
      font-weight: 500;
    }

    .cat-amount {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #111827;
    }

    .cat-bar-bg {
      flex: 1;
      height: 6px;
      background: #f3f4f6;
      border-radius: 3px;
      overflow: hidden;
      margin: 0 8px;
    }

    .cat-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .dashboard-empty {
      text-align: center;
      padding: 24px;
      color: #9ca3af;
      font-size: 0.875rem;
    }

    .dashboard-empty .emoji {
      font-size: 2rem;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="page-header">
      <div class="page-header-text">
        <h1>Your Expenses</h1>
        <p>Browse, filter, edit or delete your tracked spending</p>
      </div>
      <div class="header-right">
        <a href="index.html" class="btn-add-expense" title="Add a new expense">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
          </svg>
          Add Expense
        </a>
        <span class="user-greeting">Hi, <strong id="user-name">User</strong></span>
        <button class="btn-logout" id="btn-logout">Logout</button>
      </div>
    </div>
    <div class="layout-grid">
      <div class="main-content">

    <!-- Filter Bar -->
    <div class="filter-bar" id="filter-bar">
      <!-- Search -->
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
        </svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search expenses... e.g. travel to isb" autocomplete="off" />
        <button class="search-clear" id="search-clear" title="Clear search">✕</button>
      </div>
      <!-- Category Pills -->
      <div class="filter-pills" id="filter-pills">
        <button class="filter-pill active" data-category="All">All</button>
        <button class="filter-pill" data-category="Food">🍔 Food</button>
        <button class="filter-pill" data-category="Travel">✈️ Travel</button>
        <button class="filter-pill" data-category="Utilities">⚡ Utilities</button>
        <button class="filter-pill" data-category="Entertainment">🎬 Entertainment</button>
        <button class="filter-pill" data-category="Health">❤️ Health</button>
        <button class="filter-pill" data-category="Other">📦 Other</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-chip">
        Showing <strong id="stat-showing">0</strong> expenses
      </div>
      <div class="stat-chip">
        Total <strong id="stat-total">Rs0</strong>
      </div>
    </div>

    <!-- Expense List -->
    <div class="card">
      <div class="list-header">
        <h2 id="list-title">All Expenses</h2>
        <span class="list-meta" id="list-meta"></span>
      </div>
      <div id="expense-list"></div>
    </div>
  </div>

      <aside class="sidebar">
        <!-- Monthly Dashboard -->
        <div class="dashboard" id="dashboard">
          <div class="dashboard-header">
            <h2>Monthly Overview</h2>
            <div class="month-selector">
              <label for="month-select">Month:</label>
              <select class="month-select" id="month-select"></select>
            </div>
          </div>
          <div id="dashboard-content">
            <div class="dashboard-grid">
              <div class="chart-container">
                <canvas id="category-chart"></canvas>
                <div class="chart-center-label">
                  <div class="amount" id="chart-total">Rs0</div>
                  <div class="label">Total</div>
                </div>
              </div>
              <div class="category-breakdown" id="category-breakdown"></div>
            </div>
          </div>
        </div>
      </aside>
    </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h3>Edit Expense</h3>
      <form id="edit-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="edit-name">Expense name</label>
          <input id="edit-name" type="text" class="form-input" />
        </div>
        <div class="form-row form-group">
          <div>
            <label class="form-label" for="edit-amount">Amount (Rs.)</label>
            <input id="edit-amount" type="number" class="form-input" min="0" step="0.01" />
          </div>
          <div>
            <label class="form-label" for="edit-date">Date</label>
            <input id="edit-date" type="date" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-category">Category</label>
          <select id="edit-category" class="form-select">
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Utilities">Utilities</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-modal btn-modal-cancel" id="btn-cancel-edit">Cancel</button>
          <button type="submit" class="btn-modal btn-modal-save">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-msg"></span>
  </div>

  <script>
// ── Auth check ────────────────────────────────────────
var token = localStorage.getItem("auth_token");
if (!token) {
  window.location.href = "auth.html";
}

// Show user name
var authUser = JSON.parse(localStorage.getItem("auth_user") || '{}');
document.getElementById("user-name").textContent = authUser.name || "User";

// Helper: auth headers for fetch
function authHeaders(extra) {
  var h = { "Authorization": "Bearer " + token };
  if (extra) {
    for (var key in extra) h[key] = extra[key];
  }
  return h;
}

// Handle 401 (token expired / invalid)
function handleAuthError(res) {
  if (res.status === 401) {
    localStorage.removeItem("auth_token");
    localStorage.removeItem("auth_user");
    window.location.href = "auth.html";
    return true;
  }
  return false;
}

// ── Logout ────────────────────────────────────────────
document.getElementById("btn-logout").addEventListener("click", function() {
  localStorage.removeItem("auth_token");
  localStorage.removeItem("auth_user");
  window.location.href = "auth.html";
});

// ── State ──────────────────────────────────────────────
var allExpenses = [];   // master list from server
var monthExpenses = []; // filtered by month
var expenses = [];      // filtered list for rendering
var activeCategory = "All";
var searchQuery = "";
var editingId = null;
var activeMonth = ""; // e.g. "2026-07"
var chartInstance = null;

// Category colors
var CATEGORY_COLORS = {
  Food:          "#7c3aed",
  Travel:        "#3b82f6",
  Utilities:     "#f59e0b",
  Entertainment: "#ec4899",
  Health:        "#10b981",
  Other:         "#6b7280",
};

// ── DOM refs ──────────────────────────────────────────
var listEl = document.getElementById("expense-list");
var filterPills = document.getElementById("filter-pills");
var searchInput = document.getElementById("search-input");
var searchClear = document.getElementById("search-clear");
var listTitle = document.getElementById("list-title");
var listMeta = document.getElementById("list-meta");
var statShowing = document.getElementById("stat-showing");
var statTotal = document.getElementById("stat-total");
var editModal = document.getElementById("edit-modal");
var editForm = document.getElementById("edit-form");
var editName = document.getElementById("edit-name");
var editAmount = document.getElementById("edit-amount");
var editDate = document.getElementById("edit-date");
var editCategory = document.getElementById("edit-category");
var btnCancel = document.getElementById("btn-cancel-edit");
var toastEl = document.getElementById("toast");
var monthSelect = document.getElementById("month-select");
var chartTotal = document.getElementById("chart-total");
var breakdownEl = document.getElementById("category-breakdown");
var dashboardContent = document.getElementById("dashboard-content");

// ── Helpers ───────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return "";
  var parts = dateStr.split("-");
  return parts[2] + "/" + parts[1] + "/" + parts[0];
}

function formatAmount(amount) {
  return "Rs" + Number(amount).toLocaleString("en-IN");
}

function showToast(msg) {
  toastEl.querySelector(".toast-msg").textContent = msg;
  toastEl.classList.add("show");
  setTimeout(function() { toastEl.classList.remove("show"); }, 2500);
}

// Escape HTML to prevent XSS
function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// Highlight matching search text in a name
function highlightMatch(name, query) {
  if (!query) return escapeHtml(name);
  var safeName = escapeHtml(name);
  var safeQuery = escapeHtml(query);
  var lowerName = safeName.toLowerCase();
  var lowerQuery = safeQuery.toLowerCase();
  var idx = lowerName.indexOf(lowerQuery);
  if (idx === -1) return safeName;
  return safeName.substring(0, idx) +
    '<span class="highlight">' + safeName.substring(idx, idx + safeQuery.length) + '</span>' +
    safeName.substring(idx + safeQuery.length);
}

// ── Filter logic (client-side) ────────────────────────
function applyFilters() {
  // Step 1: filter by month
  if (activeMonth) {
    monthExpenses = allExpenses.filter(function(exp) {
      return exp.date && exp.date.substring(0, 7) === activeMonth;
    });
  } else {
    monthExpenses = allExpenses.slice();
  }

  // Update dashboard with month-filtered data
  renderDashboard();

  // Step 2: further filter by category and search
  var filtered = monthExpenses;

  if (activeCategory !== "All") {
    filtered = filtered.filter(function(exp) {
      return exp.category === activeCategory;
    });
  }

  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    filtered = filtered.filter(function(exp) {
      return exp.name.toLowerCase().indexOf(q) !== -1;
    });
  }

  expenses = filtered;
  render();
}

// ── Month helpers ─────────────────────────────────────
function getCurrentMonth() {
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}

function formatMonthLabel(ym) {
  var parts = ym.split("-");
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[parseInt(parts[1], 10) - 1] + " " + parts[0];
}

function populateMonthSelector() {
  var months = {};
  for (var i = 0; i < allExpenses.length; i++) {
    if (allExpenses[i].date) {
      var ym = allExpenses[i].date.substring(0, 7);
      months[ym] = true;
    }
  }
  // Always include current month
  var current = getCurrentMonth();
  months[current] = true;

  var sorted = Object.keys(months).sort().reverse();
  monthSelect.innerHTML = "";
  for (var j = 0; j < sorted.length; j++) {
    var opt = document.createElement("option");
    opt.value = sorted[j];
    opt.textContent = formatMonthLabel(sorted[j]);
    monthSelect.appendChild(opt);
  }

  // Set active month
  if (!activeMonth || sorted.indexOf(activeMonth) === -1) {
    activeMonth = current;
  }
  monthSelect.value = activeMonth;
}

// ── Dashboard rendering ──────────────────────────────
function renderDashboard() {
  // Calculate category totals from monthExpenses
  var catTotals = {};
  var grandTotal = 0;
  for (var i = 0; i < monthExpenses.length; i++) {
    var cat = monthExpenses[i].category || "Other";
    catTotals[cat] = (catTotals[cat] || 0) + monthExpenses[i].amount;
    grandTotal += monthExpenses[i].amount;
  }

  chartTotal.textContent = formatAmount(grandTotal);

  // Get sorted category entries
  var entries = [];
  for (var c in catTotals) {
    entries.push({ name: c, amount: catTotals[c] });
  }
  entries.sort(function(a, b) { return b.amount - a.amount; });

  if (entries.length === 0) {
    dashboardContent.innerHTML =
      '<div class="dashboard-empty"><div class="emoji">📊</div><p>No expenses this month</p></div>';
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    return;
  }

  // Restore grid if needed
  if (!document.getElementById("category-chart")) {
    dashboardContent.innerHTML =
      '<div class="dashboard-grid">' +
      '<div class="chart-container">' +
      '<canvas id="category-chart"></canvas>' +
      '<div class="chart-center-label">' +
      '<div class="amount" id="chart-total">' + formatAmount(grandTotal) + '</div>' +
      '<div class="label">Total</div>' +
      '</div></div>' +
      '<div class="category-breakdown" id="category-breakdown"></div></div>';
    chartTotal = document.getElementById("chart-total");
    breakdownEl = document.getElementById("category-breakdown");
    chartTotal.textContent = formatAmount(grandTotal);
  }

  // Build category breakdown HTML
  var catHtml = "";
  var emojis = { Food:"🍔", Travel:"✈️", Utilities:"⚡", Entertainment:"🎬", Health:"❤️", Other:"📦" };
  for (var k = 0; k < entries.length; k++) {
    var e = entries[k];
    var color = CATEGORY_COLORS[e.name] || "#6b7280";
    var pct = grandTotal > 0 ? Math.round((e.amount / grandTotal) * 100) : 0;
    var emoji = emojis[e.name] || "📦";
    catHtml +=
      '<div class="cat-row">' +
      '<span class="cat-dot" style="background:' + color + '"></span>' +
      '<span class="cat-name">' + emoji + ' ' + e.name + '</span>' +
      '<div class="cat-bar-bg"><div class="cat-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<span class="cat-amount">' + formatAmount(e.amount) + '</span>' +
      '</div>';
  }
  breakdownEl.innerHTML = catHtml;

  // Render / update chart
  var labels = entries.map(function(e) { return e.name; });
  var data = entries.map(function(e) { return e.amount; });
  var colors = entries.map(function(e) { return CATEGORY_COLORS[e.name] || "#6b7280"; });

  var canvas = document.getElementById("category-chart");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");

  if (chartInstance) {
    chartInstance.data.labels = labels;
    chartInstance.data.datasets[0].data = data;
    chartInstance.data.datasets[0].backgroundColor = colors;
    chartInstance.update();
  } else {
    chartInstance = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors,
          borderWidth: 0,
          hoverOffset: 6,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        cutout: "65%",
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(context) {
                return context.label + ": Rs" + Number(context.raw).toLocaleString("en-IN");
              }
            }
          }
        },
      },
    });
  }
}

// ── Month selector change ─────────────────────────────
monthSelect.addEventListener("change", function() {
  activeMonth = monthSelect.value;
  applyFilters();
});

// ── Render ────────────────────────────────────────────
function render() {
  // Update stats
  var total = 0;
  for (var i = 0; i < expenses.length; i++) total += expenses[i].amount;
  statShowing.textContent = expenses.length;
  statTotal.textContent = formatAmount(total);

  // Update header
  var titleText = activeCategory === "All" ? "All Expenses" : activeCategory + " Expenses";
  if (searchQuery) titleText += ' matching "' + searchQuery + '"';
  listTitle.textContent = titleText;
  if (expenses.length > 0) {
    listMeta.textContent = expenses.length + " item" + (expenses.length !== 1 ? "s" : "");
  } else {
    listMeta.textContent = "";
  }

  // Empty state
  if (expenses.length === 0) {
    var emptyMsg, subtext;
    if (searchQuery) {
      emptyMsg = 'No expenses matching "' + escapeHtml(searchQuery) + '"';
      subtext = 'Try a different search term';
    } else if (activeCategory !== "All") {
      emptyMsg = 'No ' + activeCategory.toLowerCase() + ' expenses found.';
      subtext = 'Try a different category';
    } else {
      emptyMsg = 'No expenses recorded yet.';
      subtext = 'Go back to add your first expense!';
    }
    listEl.innerHTML =
      '<div class="empty-state">' +
      '<div class="emoji">🔍</div>' +
      '<p>' + emptyMsg + '</p>' +
      '<p class="subtext">' + subtext + '</p>' +
      '</div>';
    return;
  }

  // Render items
  var html = "";
  for (var i = 0; i < expenses.length; i++) {
    var exp = expenses[i];
    var delay = Math.min(i * 50, 300);
    var badgeClass = "badge badge-" + (exp.category || "Other");
    var displayName = highlightMatch(exp.name, searchQuery);
    html +=
      '<div class="expense-item" style="animation-delay:' + delay + 'ms">' +
      '<span class="' + badgeClass + '">' + exp.category + '</span>' +
      '<span class="expense-name">' + displayName + '</span>' +
      '<span class="expense-date">' + formatDate(exp.date) + '</span>' +
      '<span class="expense-amount">' + formatAmount(exp.amount) + '</span>' +
      '<button class="btn-edit" data-id="' + exp.id + '" title="Edit">' +
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/></svg>' +
      '</button>' +
      '<button class="btn-delete" data-id="' + exp.id + '" title="Delete">' +
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/></svg>' +
      '</button>' +
      '</div>';
  }
  listEl.innerHTML = html;
}

// ── Fetch ALL expenses from backend ───────────────────
function loadExpenses() {
  fetch("http://localhost:3000/expenses", {
    headers: authHeaders()
  })
    .then(function(res) {
      if (handleAuthError(res)) return;
      return res.json();
    })
    .then(function(data) {
      if (!data) return;
      allExpenses = data;
      populateMonthSelector();
      applyFilters();
    })
    .catch(function(err) {
      console.error("Failed to load expenses:", err);
    });
}

// ── Search input ──────────────────────────────────────
searchInput.addEventListener("input", function() {
  searchQuery = searchInput.value.trim();
  if (searchQuery) {
    searchClear.classList.add("visible");
  } else {
    searchClear.classList.remove("visible");
  }
  applyFilters();
});

searchClear.addEventListener("click", function() {
  searchInput.value = "";
  searchQuery = "";
  searchClear.classList.remove("visible");
  searchInput.focus();
  applyFilters();
});

// ── Filter pill clicks ────────────────────────────────
filterPills.addEventListener("click", function(e) {
  var pill = e.target.closest(".filter-pill");
  if (!pill) return;

  // Update active state
  var pills = filterPills.querySelectorAll(".filter-pill");
  for (var i = 0; i < pills.length; i++) pills[i].classList.remove("active");
  pill.classList.add("active");

  activeCategory = pill.getAttribute("data-category");
  applyFilters();
});

// ── Edit / Delete clicks ──────────────────────────────
listEl.addEventListener("click", function(e) {
  var editBtn = e.target.closest(".btn-edit");
  var deleteBtn = e.target.closest(".btn-delete");

  if (editBtn) {
    var id = editBtn.getAttribute("data-id");
    // Look up in allExpenses since the item always exists there
    var exp = null;
    for (var i = 0; i < allExpenses.length; i++) {
      if (String(allExpenses[i].id) === String(id)) { exp = allExpenses[i]; break; }
    }
    if (exp) {
      editingId = id;
      editName.value = exp.name;
      editAmount.value = exp.amount;
      editDate.value = exp.date;
      editCategory.value = exp.category;
      editModal.classList.add("open");
    }
  } else if (deleteBtn) {
    var id = deleteBtn.getAttribute("data-id");
    fetch("http://localhost:3000/expenses/" + id, {
      method: "DELETE",
      headers: authHeaders()
    })
      .then(function(res) {
        if (handleAuthError(res)) return;
        allExpenses = allExpenses.filter(function(exp) {
          return String(exp.id) !== String(id);
        });
        applyFilters();
        showToast("Expense deleted");
      })
      .catch(function(err) { console.error("Failed to delete:", err); });
  }
});

// ── Edit modal actions ────────────────────────────────
btnCancel.addEventListener("click", function() {
  editModal.classList.remove("open");
  editingId = null;
});

editModal.addEventListener("click", function(e) {
  if (e.target === editModal) {
    editModal.classList.remove("open");
    editingId = null;
  }
});

editForm.addEventListener("submit", function(e) {
  e.preventDefault();
  if (!editingId) return;

  var payload = {
    name: editName.value.trim(),
    amount: parseFloat(editAmount.value),
    date: editDate.value,
    category: editCategory.value,
  };

  fetch("http://localhost:3000/expenses/" + editingId, {
    method: "PUT",
    headers: authHeaders({ "Content-Type": "application/json" }),
    body: JSON.stringify(payload),
  })
    .then(function(res) {
      if (handleAuthError(res)) return;
      return res.json();
    })
    .then(function(updated) {
      if (!updated) return;
      editModal.classList.remove("open");
      editingId = null;
      // Reload from server to stay in sync
      loadExpenses();
      showToast("Expense updated");
    })
    .catch(function(err) { console.error("Failed to update:", err); });
});

// ── Init ──────────────────────────────────────────────
loadExpenses();
  </script>
</body>
